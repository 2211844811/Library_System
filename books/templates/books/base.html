<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة المكتبة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'book_list' %}">مكتبة ITWT413</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'book_list' %}">الرئيسية</a></li>
          {% if user.is_staff %}
    <li class="nav-item">
        <a class="nav-link" href="{% url 'add_book' %}">إضافة كتاب</a>
    </li>
{% endif %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_loans' %}">استعارتي</a></li>
                </ul>
               <form action="{% url 'book_list' %}" method="GET" class="d-flex">
    <input class="form-control me-2" type="search" name="q" placeholder="بحث عن كتاب..." aria-label="Search" value="{{ request.GET.q }}">
    <button class="btn btn-outline-light" type="submit">بحث</button>
</form>
            </div>
        </div>
    </nav>
    <main class="container mt-4">{% block content %}{% endblock %}</main>
</body>
</html>
