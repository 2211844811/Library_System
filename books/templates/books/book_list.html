{% extends 'books/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">
        <h2>قائمة الكتب</h2>
    </div>
    <div class="card-body">
        <ul class="list-group">
            {% for book in books %}
                <li class="list-group-item">
                    <strong>{{ book.title }}</strong> - المؤلف: {{ book.author }}
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
