{% extends 'books/base.html' %}

{% block content %}
<h2 class="mb-4">كتبي المستعارة</h2>
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>عنوان الكتاب</th>
            <th>المؤلف</th>
        </tr>
    </thead>
    <tbody>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" class="text-center">لا توجد كتب مستعارة.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
