{% extends 'books/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark">📚 الكتب المتاحة في المكتبة</h2>
    <button class="btn btn-primary shadow-sm">+ إضافة كتاب جديد</button>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-dark">
                    <tr>
                        <th>الرقم التسلسلي</th>
                        <th>عنوان الكتاب</th>
                        <th>المؤلف</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#101</td>
                        <td class="fw-bold">مقدمة في علم الحاسوب</td>
                        <td>أحمد ذكي</td>
                        <td><span class="badge bg-success">متاح</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-info">تفاصيل</button>
                            <button class="btn btn-sm btn-success me-1">استعارة</button>
                        </td>
                    </tr>
                    <tr>
                        <td>#102</td>
                        <td class="fw-bold">أساسيات هندسة البرمجيات</td>
                        <td>د. محمد علي</td>
                        <td><span class="badge bg-danger">مستعار</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-info">تفاصيل</button>
                            <button class="btn btn-sm btn-secondary me-1" disabled>غير متاح</button>
                        </td>
                    </tr>
                    <tr>
                        <td>#103</td>
                        <td class="fw-bold">تصميم وتحليل الخوارزميات</td>
                        <td>سارة عبد الله</td>
                        <td><span class="badge bg-success">متاح</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-info">تفاصيل</button>
                            <button class="btn btn-sm btn-success me-1">استعارة</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
